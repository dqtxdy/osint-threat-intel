cisa_kev:
  id: cisa_kev
  name: CISA Known Exploited Vulnerabilities
  url: https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json
  mirror_urls:
    - https://raw.githubusercontent.com/cisagov/kev-data/develop/known_exploited_vulnerabilities.json
  fallback_path: data/sample_cisa_kev.json
  source_type: structured_feed

reddit:
  id: reddit_security
  name: Reddit Security Communities
  source_type: social
  token_url: https://www.reddit.com/api/v1/access_token
  api_base_url: https://oauth.reddit.com
  public_base_url: https://www.reddit.com
  subreddits:
    - netsec
    - cybersecurity
    - blueteamsec
    - threatintel
    - malware
  limit_per_subreddit: 50
  fallback_path: data/sample_reddit_security.json

x:
  id: x_security
  name: X Cybersecurity Search
  source_type: social
  api_url: https://api.x.com/2/tweets/search/recent
  max_results: 50
  queries:
    - '(CVE OR zero-day OR "0day" OR vulnerability OR ransomware) lang:en -is:retweet'
    - '("threat intelligence" OR malware OR "active exploitation") lang:en -is:retweet'
    - '(CVE OR vulnérabilité OR rançongiciel OR ransomware) lang:fr -is:retweet'
    - '(CVE OR 脆弱性 OR ランサムウェア OR マルウェア) lang:ja -is:retweet'
  fallback_path: data/sample_x_security.json

phishtank:
  id: phishtank
  name: PhishTank Verified Active Phishing
  source_type: threat_feed
  url: https://data.phishtank.com/data/online-valid.json
  keyed_url_template: https://data.phishtank.com/data/{app_key}/online-valid.json
  limit: 200
  fallback_path: data/sample_phishtank.json

otx:
  id: otx
  name: AlienVault OTX Pulses
  source_type: threat_feed
  api_url: https://otx.alienvault.com/api/v1/pulses/subscribed
  limit: 50
  fallback_path: data/sample_otx_pulses.json

nvd:
  id: nvd
  name: National Vulnerability Database
  api_url: https://services.nvd.nist.gov/rest/json/cves/2.0
  timeout: 8
  fallback_path: data/sample_nvd_cves.json

mitre_attack:
  id: mitre_attack
  name: MITRE ATT&CK
  fallback_path: data/attack_enterprise_techniques.json

urlhaus:
  id: urlhaus
  name: URLhaus Malware URLs
  source_type: threat_feed
  api_url: https://urlhaus-api.abuse.ch/v1/urls/recent/
  limit: 200
  fallback_path: data/sample_urlhaus.json

threatfox:
  id: threatfox
  name: ThreatFox IOCs
  source_type: threat_feed
  api_url: https://threatfox-api.abuse.ch/api/v1/
  limit: 200
  fallback_path: data/sample_threatfox.json

github_advisories:
  id: github_advisories
  name: GitHub Security Advisories
  source_type: vendor
  api_url: https://api.github.com/advisories
  limit: 100
  fallback_path: data/sample_github_advisories.json

first_epss:
  id: first_epss
  name: FIRST EPSS
  api_url: https://api.first.org/data/v1/epss
  fallback_path: data/sample_epss.json
